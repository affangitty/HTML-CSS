<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Accordion</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="accordion">

    <div class="accordion-item">
        <input type="checkbox" id="acc1">
        <label for="acc1">Section 1</label>
        <div class="content">
            <p>This is content for section 1.</p>
        </div>
    </div>

    <div class="accordion-item">
        <input type="checkbox" id="acc2">
        <label for="acc2">Section 2</label>
        <div class="content">
            <p>This is content for section 2.</p>
        </div>
    </div>

    <div class="accordion-item">
        <input type="checkbox" id="acc3">
        <label for="acc3">Section 3</label>
        <div class="content">
            <p>This is content for section 3.</p>
        </div>
    </div>

</div>

</body>
</html>
