<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Multi Page Simulator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
    <h1>My CSS Website</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<main class="pages">

    <section id="home" class="page active">
        <h2>Home</h2>
        <p>Welcome to our CSS-only multi-page simulator.</p>
    </section>

    <section id="about" class="page">
        <h2>About</h2>
        <p>This page demonstrates advanced CSS routing techniques.</p>
    </section>

    <section id="services" class="page">
        <h2>Services</h2>
        <p>We provide web design, development and UI solutions.</p>
    </section>

    <section id="contact" class="page">
        <h2>Contact</h2>
        <p>Contact us via email or phone.</p>
    </section>

</main>

</body>
</html>
