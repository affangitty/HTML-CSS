<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Layout</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="header">
        <h1>Dashboard</h1>
    </header>

    <div class="layout">

        <aside class="sidebar">
            <nav>
                <a href="#">Home</a>
                <a href="#">Analytics</a>
                <a href="#">Reports</a>
                <a href="#">Settings</a>
            </nav>
        </aside>

        <main class="main">

            <section class="hero">
                <div class="hero-card">
                    <h2>Welcome Back</h2>
                    <p>This card overlaps using z-index.</p>
                </div>
            </section>

            <section class="cards">
                <div class="card">Card 1</div>
                <div class="card">Card 2</div>
                <div class="card">Card 3</div>
            </section>

        </main>

    </div>

</body>

</html>
